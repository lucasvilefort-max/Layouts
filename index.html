<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect 11th - GitHub Edition</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #ffffff; --text: #eee; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .controls { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #map-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        #map { position: relative; border: 1px solid #555; background-image: radial-gradient(#333 1px, transparent 1px); }
        .footprint { position: absolute; border: 1px solid rgba(255,255,255,0.6); box-sizing: border-box; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .skull { font-size: 16px; position: absolute; text-shadow: 0 0 5px #000; }
        .guide { position: absolute; border: 0.5px dashed rgba(255,255,255,0.5); pointer-events: none; }
        .dist-label { position: absolute; font-size: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 1px 4px; border-radius: 3px; white-space: nowrap; font-weight: bold; }
        /* Cores Manual */
        .vermelho { background: rgba(255, 0, 0, 0.5); } .laranja { background: rgba(255, 165, 0, 0.5); }
        .verde { background: rgba(0, 255, 0, 0.4); } .amarelo { background: rgba(255, 255, 0, 0.4); }
        .azul { background: rgba(0, 0, 255, 0.5); } .roxo { background: rgba(128, 0, 128, 0.5); }
        .nav-tools { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 15px; z-index: 100; }
        .btn-icon { width: 55px; height: 55px; border-radius: 50%; border: none; background: #1a1a1a; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        #modal-inv { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; z-index: 200; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="controls">
            <input type="password" id="api-key" placeholder="Gemini API Key">
            <div style="display:flex; gap:10px;">
                <input type="number" id="w-in" placeholder="L (pol)">
                <input type="number" id="h-in" placeholder="A (pol)">
            </div>
            <select id="layout-select"><option value="">Carregando...</option></select>
            <div style="border-top: 1px solid #333; margin: 10px 0; padding-top: 10px;">
                <input type="text" id="new-map-name" placeholder="Nome do mapa">
                <input type="file" id="file-in" accept="image/*">
                <button class="btn" onclick="saveNewLayout()" style="background: #222; color: #fff; font-size: 12px;">Salvar no Banco de Dados</button>
            </div>
            <button class="btn" onclick="generateWithAI()">Gerar com IA</button>
            <div id="status" style="font-size:11px; color:#888; margin-top:10px; text-align:center;"></div>
        </div>
    </div>

    <div id="screen-map" class="screen">
        <div id="map-container"><div id="map"></div></div>
        <div class="nav-tools">
            <button class="btn-icon" onclick="showScreen('screen-home')">⬅️</button>
            <button class="btn-icon" onclick="toggleInv(true)">🧩</button>
        </div>
    </div>

    <div id="modal-inv">
        <h3 style="margin-top:0">Inventário</h3>
        <ul id="inv-list" style="list-style:none; padding:0;"></ul>
        <button class="btn" onclick="toggleInv(false)">Fechar</button>
    </div>

    <script>
        // BANCO DE DADOS INDEXEDDB
        let db;
        const request = indexedDB.open("WarhammerDB", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("layouts");
        request.onsuccess = e => { db = e.target.result; updateDropdown(); };

        const MANUAL = `[DOCUMENTO DE DIRETRIZ TÉCNICA: WARHAMMER_11TH_BATTLEFIELD_ARCHITECT] 1. MOTOR DE VISÃO: Análise Base64 exclusiva. 2. INVENTÁRIO: 02x Triângulos(Vermelho), 04x Grandes(Laranja), 02x Slim(Verde), 04x Médios(Amarelo), 02x Azul, 04x Roxo. 3. REGRAS: 1 peça/SqFt. Bloqueio de visão. 4" entre grandes. 4. ESCALONAMENTO: No Man's Land > Home > Centro. 5. JSON: {inventory_summary:{color:qty}, elements:[{name, x_borda, y_borda, w, h, color, is_objective, dist_x, dist_y}]}`;

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };

        function updateDropdown() {
            const sel = document.getElementById('layout-select');
            sel.innerHTML = '<option value="">Escolher Layout Salvo</option>';
            const tx = db.transaction("layouts", "readonly");
            tx.objectStore("layouts").getAllKeys().onsuccess = e => {
                e.target.result.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name; sel.appendChild(opt);
                });
            };
        }

        function saveNewLayout() {
            const name = document.getElementById('new-map-name').value;
            const file = document.getElementById('file-in').files;
            if (!name || !file[0]) return alert("Dê um nome e selecione a imagem.");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const data = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const tx = db.transaction("layouts", "readwrite");
                    tx.objectStore("layouts").put(data, name);
                    tx.oncomplete = () => { updateDropdown(); alert("Salvo no banco de dados!"); };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file[0]);
        }

        async function generateWithAI() {
            const key = document.getElementById('api-key').value;
            const layoutName = document.getElementById('layout-select').value;
            const w = document.getElementById('w-in').value;
            const h = document.getElementById('h-in').value;
            const status = document.getElementById('status');

            if(!key || !layoutName || !w || !h) return alert("Faltam dados.");
            localStorage.setItem('gemini_api_key', key);
            status.innerText = "IA Analisando imagem...";

            const tx = db.transaction("layouts", "readonly");
            tx.objectStore("layouts").get(layoutName).onsuccess = async e => {
                const base64Data = e.target.result.split(',')[1];
                const url = `https://googleapis.com{key}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: `Siga o MANUAL: ${MANUAL}. Mesa: ${w}x${h}. Gere o JSON puro.` },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const res = await response.json();
                    let textResponse = res.candidates[0].content.parts[0].text;
                    textResponse = textResponse.replace(/```json|```/g, '').trim();
                    renderMap(JSON.parse(textResponse));
                    showScreen('screen-map');
                } catch (err) {
                    alert("Erro API: " + err.message);
                } finally { status.innerText = ""; }
            };
        }

        function renderMap(data) {
            const W = document.getElementById('w-in').value;
            const H = document.getElementById('h-in').value;
            const map = document.getElementById('map');
            const scale = Math.min((window.innerWidth - 40) / W, (window.innerHeight - 40) / H);
            map.style.width = (W * scale) + "px"; map.style.height = (H * scale) + "px";
            map.style.backgroundSize = `${scale}px ${scale}px`;
            map.innerHTML = '';

            data.elements.forEach(el => {
                const div = document.createElement('div');
                div.className = `footprint ${el.color.toLowerCase()}`;
                div.style.width = (el.w * scale) + "px"; div.style.height = (el.h * scale) + "px";
                div.style.left = (el.x_borda * scale) + "px"; div.style.top = (el.y_borda * scale) + "px";
                if(el.is_objective) div.innerHTML = '<span class="skull">💀</span>';
                
                const lx = document.createElement('div'); lx.className='guide'; lx.style.width=(el.x_borda*scale)+"px"; lx.style.height="1px"; lx.style.left=`-${el.x_borda*scale}px`; lx.style.top="0";
                lx.innerHTML = `<span class="dist-label" style="top:-14px">${el.x_borda}"</span>`;
                const ly = document.createElement('div'); ly.className='guide'; ly.style.height=(el.y_borda*scale)+"px"; ly.style.width="1px"; ly.style.top=`-${el.y_borda*scale}px`; ly.style.left="0";
                ly.innerHTML = `<span class="dist-label" style="left:5px">${el.y_borda}"</span>`;
                
                div.appendChild(lx); div.appendChild(ly);
                map.appendChild(div);
            });

            const list = document.getElementById('inv-list');
            list.innerHTML = '';
            for(let c in data.inventory_summary) list.innerHTML += `<li><b>${data.inventory_summary[c]}x</b> ${c.toUpperCase()}</li>`;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleInv(s) { document.getElementById('modal-inv').style.display = s ? 'block' : 'none'; }
    </script>
</body>
</html>
