<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect 11th</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #ffffff; --text: #eee; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .controls { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-sec { background: #222; color: #fff; border: 1px solid #555; font-size: 12px; }
        #map-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        #map { position: relative; border: 1px solid #555; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .footprint { position: absolute; border: 1px solid rgba(255,255,255,0.6); box-sizing: border-box; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .skull { font-size: 16px; position: absolute; }
        .guide { position: absolute; border: 0.5px dashed rgba(255,255,255,0.5); pointer-events: none; }
        .dist-label { position: absolute; font-size: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 1px 4px; border-radius: 3px; white-space: nowrap; font-weight: bold; border: 0.5px solid #444; }
        /* Cores Manual 1.1 */
        .vermelho { background: rgba(255, 0, 0, 0.5); } .laranja { background: rgba(255, 165, 0, 0.5); }
        .verde { background: rgba(0, 255, 0, 0.4); } .amarelo { background: rgba(255, 255, 0, 0.4); }
        .azul { background: rgba(0, 0, 255, 0.5); } .roxo { background: rgba(128, 0, 128, 0.5); }
        .nav-tools { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 15px; z-index: 100; }
        .btn-icon { width: 55px; height: 55px; border-radius: 50%; border: none; background: #1a1a1a; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #modal-inv { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; z-index: 200; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="controls">
            <div style="display:flex; gap:10px;">
                <input type="number" id="w-in" placeholder="L (pol)">
                <input type="number" id="h-in" placeholder="A (pol)">
            </div>
            
            <select id="layout-select"><option value="">Aguardando Navegador...</option></select>

            <div style="border-top: 1px solid #333; margin: 10px 0; padding-top: 10px;">
                <input type="text" id="new-map-name" placeholder="Nome do Mapa">
                <input type="file" id="file-in" accept="image/*">
                <button class="btn btn-sec" onclick="saveLayout()">Salvar Layout</button>
            </div>
            
            <button class="btn" onclick="copyPrompt()">1. Copiar Prompt para IA</button>
            <button class="btn" style="background:#444; color:#fff" onclick="inputJson()">2. Colar JSON e Gerar</button>
        </div>
    </div>

    <div id="screen-map" class="screen">
        <div id="map-container"><div id="map"></div></div>
        <div class="nav-tools">
            <button class="btn-icon" onclick="showScreen('screen-home')">⬅️</button>
            <button class="btn-icon" onclick="toggleInv(true)">🧩</button>
        </div>
    </div>

    <div id="modal-inv">
        <h3 style="margin-top:0">Inventário</h3>
        <ul id="inv-list" style="list-style:none; padding:0;"></ul>
        <button class="btn" onclick="toggleInv(false)">Fechar</button>
    </div>

    <script>
        const MANUAL = [DOCUMENTO DE DIRETRIZ TÉCNICA: WARHAMMER_11TH_BATTLEFIELD_ARCHITECT] 1. MOTOR DE VISÃO: Interpretação via imagem. 2. INVENTÁRIO: 2x Vermelho, 4x Laranja, 2x Verde, 4x Amarelo, 2x Azul, 4x Roxo. 3. REGRAS: 1 peça/SqFt, 4" entre grandes. 4. JSON: {inventory_summary, elements:[{name, x_borda, y_borda, w, h, color, is_objective, dist_x, dist_y}]};

        let db;
        const dbReq = indexedDB.open("WarhammerV6", 1);
        
        dbReq.onupgradeneeded = e => e.target.result.createObjectStore("layouts");
        dbReq.onsuccess = e => { db = e.target.result; updateDropdown(); };
        dbReq.onerror = e => alert("Erro de segurança do navegador. Tente abrir pelo GitHub (HTTPS).");

        function updateDropdown() {
            const sel = document.getElementById('layout-select');
            sel.innerHTML = '<option value="">Escolher Layout Salvo</option>';
            if(!db) return;
            db.transaction("layouts").objectStore("layouts").getAllKeys().onsuccess = e => {
                e.target.result.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name; sel.appendChild(opt);
                });
            };
        }

        function saveLayout() {
            const name = document.getElementById('new-map-name').value;
            const file = document.getElementById('file-in').files[0];
            if(!name || !file) return alert("Preencha nome e foto.");

            const reader = new FileReader();
            reader.onload = e => {
                const tx = db.transaction("layouts", "readwrite");
                tx.objectStore("layouts").put(e.target.result, name).onsuccess = () => {
                    alert("Sucesso!");
                    updateDropdown();
                };
            };
            reader.readAsDataURL(file);
        }

        function copyPrompt() {
            const w = document.getElementById('w-in').value;
            const h = document.getElementById('h-in').value;
            const layout = document.getElementById('layout-select').value;
            if(!w || !h || !layout) return alert("Faltam dados.");

            const pText = IA, use o MANUAL:\n${MANUAL}\n\nINPUT: Mesa ${w}x${h} pol. Use a imagem do layout ${layout}.\n\nResponda APENAS JSON.;
            
            const area = document.createElement("textarea");
            area.value = pText; document.body.appendChild(area); area.select();
            document.execCommand("copy"); document.body.removeChild(area);
            alert("Prompt copiado!");
        }

        function inputJson() {
            const raw = prompt("Cole o JSON da IA:");
            if(!raw) return;
            try {
                const data = JSON.parse(raw.replace(/json|/g, '').trim());
                renderMap(data);
                showScreen('screen-map');
            } catch(e) { alert("Erro no JSON."); }
        }

        function renderMap(data) {
            const W = document.getElementById('w-in').value;
            const H = document.getElementById('h-in').value;
            const map = document.getElementById('map');
            const scale = Math.min((window.innerWidth - 40) / W, (window.innerHeight - 40) / H);
            map.style.width = (W * scale) + "px"; map.style.height = (H * scale) + "px";
            map.innerHTML = '';

            data.elements.forEach(el => {
                const div = document.createElement('div');
                div.className = footprint ${el.color.toLowerCase()};
                div.style.width = (el.w * scale) + "px"; div.style.height = (el.h * scale) + "px";
                div.style.left = (el.x_borda * scale) + "px"; div.style.top = (el.y_borda * scale) + "px";
                if(el.is_objective) div.innerHTML = '<span class="skull">💀</span>';
                
                const lx = document.createElement('div'); lx.className='guide'; lx.style.width=(el.dist_x*scale)+"px"; lx.style.height="1px"; lx.style.left=-${el.dist_x*scale}px; lx.style.top="0";
                lx.innerHTML = <span class="dist-label" style="top:-14px">${el.dist_x}"</span>;
                const ly = document.createElement('div'); ly.className='guide'; ly.style.height=(el.dist_y*scale)+"px"; ly.style.width="1px"; ly.style.top=-${el.dist_y*scale}px; ly.style.left="0";
                ly.innerHTML = <span class="dist-label" style="left:5px">${el.dist_y}"</span>;
                
                div.appendChild(lx); div.appendChild(ly);
                map.appendChild(div);
            });

            const list = document.getElementById('inv-list');
            list.innerHTML = '';
            for(let c in data.inventory_summary) list.innerHTML += <li><b>${data.inventory_summary[c]}x</b> ${c.toUpperCase()}</li>;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleInv(s) { document.getElementById('modal-inv').style.display = s ? 'block' : 'none'; }
    </script>
</body>
</html>
